name: Build and Test (GTest)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Run GTest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build g++ libssl-dev ccache

      - name: Restore model artifacts cache
        id: model-cache
        uses: actions/cache@v4
        with:
          path: |
            python/ctr_training/checkpoints/best_model.pt
            models/deep_fm.onnx
          key: ${{ runner.os }}-py311-deepfm-${{ hashFiles('python/ctr_training/train_with_synthetic_data.py', 'python/ctr_training/train.py', 'python/ctr_training/export_onnx.py', 'python/ctr_training/*.py') }}

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-gcc-${{ hashFiles('CMakeLists.txt', 'core/**/CMakeLists.txt', 'tests/CMakeLists.txt', 'data/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-gcc-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch torchvision onnx onnxruntime numpy scikit-learn tqdm pandas --quiet

      - name: Train DeepFM model with synthetic data
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p models python/ctr_training/checkpoints
          python python/ctr_training/train_with_synthetic_data.py \
            --num-samples 10000 \
            --epochs 2 \
            --batch-size 1024 \
            --embed-dim 16 \
            --output-dir python/ctr_training/checkpoints

      - name: Export trained model to ONNX
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          test -f python/ctr_training/checkpoints/best_model.pt
          python python/ctr_training/export_onnx.py \
            --checkpoint python/ctr_training/checkpoints/best_model.pt \
            --output models/deep_fm.onnx \
            --opset 14 \
            --no-verbose
          test -f models/deep_fm.onnx
          echo "✓ ONNX model exported"

      - name: Show ccache stats (before build)
        run: ccache --show-stats || true

      - name: Generate test data
        run: |
          mkdir -p data/data
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_STANDARD=20 \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --target ad_generator --parallel $(nproc)
          ./build/bin/ad_generator -n 100 -o data/data/ads_data.json
          test -f data/data/ads_data.json
          echo "✓ Test data generated"

      - name: Verify required generated artifacts
        run: |
          test -f python/ctr_training/checkpoints/best_model.pt
          test -f models/deep_fm.onnx
          test -f data/data/ads_data.json
          test -f data/data/openrtb_requests.json

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --parallel $(nproc)

      - name: Show ccache stats (after build)
        run: ccache --show-stats || true
